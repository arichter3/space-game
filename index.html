<!DOCTYPE html>
<!-- 2D infinite space: camera wraps, stars stay in world -->
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"></head>
<body style="margin:0; overflow:hidden; background:#003;">
<style>
#controls {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 10;
    user-select: none;
}

button {
    width: 60px;
    height: 60px;
    font-size: 20px;
    margin: 5px;
}
#joystick {
    position: fixed;
    bottom: 40px;
    left: 40px;
    width: 120px;
    height: 120px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    touch-action: none;
}

#stick {
    position: absolute;
    left: 35px;
    top: 35px;
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
}
</style>   
<div id="joystick">
    <div id="stick"></div>
</div>
<canvas id="myCanvas"></canvas>

<script>
const VERSION = "v0.08";
const canvas = document.getElementById("myCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // keep ship centered relative to screen
    ship.x = canvas.width / 2 - ship.size / 2;
    ship.y = canvas.height - 80;
}

function handleResize() {
    setTimeout(resizeCanvas, 100); // wait for screen to settle
}

window.addEventListener("resize", handleResize);
window.addEventListener("orientationchange", handleResize);
const keys = {};

// 🎮 input
window.addEventListener("keydown", (e) => {
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup", (e) => {
    keys[e.key.toLowerCase()] = false;
});
const joystick = document.getElementById("joystick");
const stick = document.getElementById("stick");

let joyActive = false;
let joyX = 0;
let joyY = 0;

const JOY_RADIUS = 60;
canvas.style.touchAction = "none";
joystick.addEventListener("touchstart", (e) => {
    joyActive = true;
});

joystick.addEventListener("touchmove", (e) => {
    e.preventDefault();

    const rect = joystick.getBoundingClientRect();
    const touch = e.touches[0];

    let x = touch.clientX - rect.left - JOY_RADIUS;
    let y = touch.clientY - rect.top - JOY_RADIUS;

    const dist = Math.sqrt(x*x + y*y);

    // limit to circle
    if (dist > JOY_RADIUS) {
        x = (x / dist) * JOY_RADIUS;
        y = (y / dist) * JOY_RADIUS;
    }

    joyX = x / JOY_RADIUS;
    joyY = y / JOY_RADIUS;

    // move stick visually
    stick.style.left = (x + JOY_RADIUS - 25) + "px";
    stick.style.top = (y + JOY_RADIUS - 25) + "px";
});

joystick.addEventListener("touchend", () => {
    joyActive = false;
    joyX = 0;
    joyY = 0;

    // reset stick
    stick.style.left = "35px";
    stick.style.top = "35px";
});

// 🌌 world size (wrap boundary)
const WORLD_SIZE = 2000;

// 🎮 camera (this moves through space)
const camera = {
    x: 0,
    y: 0,
    speed: 3
};

// 🚀 fixed ship (HUD style)
const ship = {
    x: canvas.width / 2 - 25,
    y: canvas.height - 80,
    size: 50
};
resizeCanvas(); // run once at start to set canvas size and ship position
// ⭐ stars in world space
const STAR_COUNT = 100;
const stars = [];

for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
        x: Math.random() * WORLD_SIZE - WORLD_SIZE / 2,
        y: Math.random() * WORLD_SIZE - WORLD_SIZE / 2,
        size: 1 + Math.random() * 2
    });
}

// 🔄 wrap camera so space never ends
function wrapCamera() {
    if (camera.x < -WORLD_SIZE / 2) camera.x = WORLD_SIZE / 2;
    if (camera.x > WORLD_SIZE / 2) camera.x = -WORLD_SIZE / 2;

    if (camera.y < -WORLD_SIZE / 2) camera.y = WORLD_SIZE / 2;
    if (camera.y > WORLD_SIZE / 2) camera.y = -WORLD_SIZE / 2;
}

function update() {
    // keyboard
    if (keys["w"] || keys["arrowup"]) camera.y -= camera.speed;
    if (keys["s"] || keys["arrowdown"]) camera.y += camera.speed;
    if (keys["a"] || keys["arrowleft"]) camera.x -= camera.speed;
    if (keys["d"] || keys["arrowright"]) camera.x += camera.speed;

    wrapCamera();
    // joystick movement
    camera.x += joyX * camera.speed * 2;
    camera.y += joyY * camera.speed * 2;
}

function render() {
    // clear screen
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // ⭐ draw stars relative to camera
    ctx.fillStyle = "white";

   for (let star of stars) {
    // Compute star position relative to the camera in world space
    let dx = star.x - camera.x;
    let dy = star.y - camera.y;

    // wrap into a repeating space (no snapping)
    dx = ((dx + WORLD_SIZE) % WORLD_SIZE) - WORLD_SIZE / 2;
    dy = ((dy + WORLD_SIZE) % WORLD_SIZE) - WORLD_SIZE / 2;

    const screenX = dx + canvas.width / 2;
    const screenY = dy + canvas.height / 2;

    ctx.fillRect(screenX, screenY, star.size, star.size);
    // 🧪 version number
ctx.fillStyle = "white";
ctx.font = "16px monospace";
ctx.textAlign = "right";
ctx.fillText(VERSION, canvas.width - 10, 20);
}

    // 🚀 ship (fixed HUD position)
    ctx.fillStyle = "red";
    ctx.fillRect(ship.x, ship.y, ship.size, ship.size);
}

function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
