<!DOCTYPE html>
<!-- 2D infinite space: camera wraps, stars stay in world -->
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"></head>
<body style="margin:0; overflow:hidden; background:#003;">
<style>
#controls {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 10;
    user-select: none;
}

button {
    width: 60px;
    height: 60px;
    font-size: 20px;
    margin: 5px;
}
</style>   

<canvas id="myCanvas"></canvas>

<script>
const canvas = document.getElementById("myCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // keep ship centered relative to screen
    ship.x = canvas.width / 2 - ship.size / 2;
    ship.y = canvas.height - 80;
}

window.addEventListener("resize", resizeCanvas);
window.addEventListener("orientationchange", resizeCanvas);

const keys = {};

// 🎮 input
window.addEventListener("keydown", (e) => {
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup", (e) => {
    keys[e.key.toLowerCase()] = false;
});

let isTouching = false;
let lastTouchX = 0;
let lastTouchY = 0;

canvas.addEventListener("touchstart", (e) => {
    e.preventDefault();
    isTouching = true;

    const touch = e.touches[0];
    lastTouchX = touch.clientX;
    lastTouchY = touch.clientY;
});

canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();
    if (!isTouching) return;

    const touch = e.touches[0];

    const dx = touch.clientX - lastTouchX;
    const dy = touch.clientY - lastTouchY;

    // move camera opposite to drag (feels natural)
    camera.x -= dx * 0.5;
    camera.y -= dy * 0.5;

    lastTouchX = touch.clientX;
    lastTouchY = touch.clientY;
});

canvas.addEventListener("touchend", () => {
    isTouching = false;
});

// 🌌 world size (wrap boundary)
const WORLD_SIZE = 2000;

// 🎮 camera (this moves through space)
const camera = {
    x: 0,
    y: 0,
    speed: 3
};

// 🚀 fixed ship (HUD style)
const ship = {
    x: canvas.width / 2 - 25,
    y: canvas.height - 80,
    size: 50
};
resizeCanvas(); // run once at start to set canvas size and ship position
// ⭐ stars in world space
const STAR_COUNT = 100;
const stars = [];

for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
        x: Math.random() * WORLD_SIZE - WORLD_SIZE / 2,
        y: Math.random() * WORLD_SIZE - WORLD_SIZE / 2,
        size: 1 + Math.random() * 2
    });
}

// 🔄 wrap camera so space never ends
function wrapCamera() {
    if (camera.x < -WORLD_SIZE / 2) camera.x = WORLD_SIZE / 2;
    if (camera.x > WORLD_SIZE / 2) camera.x = -WORLD_SIZE / 2;

    if (camera.y < -WORLD_SIZE / 2) camera.y = WORLD_SIZE / 2;
    if (camera.y > WORLD_SIZE / 2) camera.y = -WORLD_SIZE / 2;
}

function update() {
    // keyboard
    if (keys["w"] || keys["arrowup"]) camera.y -= camera.speed;
    if (keys["s"] || keys["arrowdown"]) camera.y += camera.speed;
    if (keys["a"] || keys["arrowleft"]) camera.x -= camera.speed;
    if (keys["d"] || keys["arrowright"]) camera.x += camera.speed;

    wrapCamera();
}

function render() {
    // clear screen
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // ⭐ draw stars relative to camera
    ctx.fillStyle = "white";

   for (let star of stars) {
    // Compute star position relative to the camera in world space
    let dx = star.x - camera.x;
    let dy = star.y - camera.y;

    // wrap into a repeating space (no snapping)
    dx = ((dx + WORLD_SIZE) % WORLD_SIZE) - WORLD_SIZE / 2;
    dy = ((dy + WORLD_SIZE) % WORLD_SIZE) - WORLD_SIZE / 2;

    const screenX = dx + canvas.width / 2;
    const screenY = dy + canvas.height / 2;

    ctx.fillRect(screenX, screenY, star.size, star.size);
}

    // 🚀 ship (fixed HUD position)
    ctx.fillStyle = "red";
    ctx.fillRect(ship.x, ship.y, ship.size, ship.size);
}

function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
